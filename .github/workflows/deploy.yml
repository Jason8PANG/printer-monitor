name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/opt/printer-monitor' }}
        run: |
          echo "🚀 开始部署到 $SERVER_HOST..."
          
          # 创建部署目录
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "mkdir -p $DEPLOY_DIR"
          
          # 备份当前版本
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "[ -d $DEPLOY_DIR/current ] && cp -r $DEPLOY_DIR/current $DEPLOY_DIR/backup_$(date +%Y%m%d_%H%M%S)" || true
          
          # 上传文件
          scp -r \
            server.js \
            package.json \
            public/ \
            $SERVER_USER@$SERVER_HOST:$DEPLOY_DIR/current
          
          # 安装依赖
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "cd $DEPLOY_DIR/current && npm install --production"
          
          # 重启服务
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "systemctl restart printer-monitor"
          
          echo "✅ 部署完成!"
      
      - name: Verify deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "验证服务状态..."
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "systemctl is-active printer-monitor" || exit 1
          echo "服务运行正常!"
