name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: |
          if [ -f package.json ]; then
            npm run lint 2>/dev/null || echo "No lint script found, skipping"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Alpine image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: printer-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AlmaLinux image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.centos
          push: false
          tags: printer-monitor-almalinux:test
          cache-from: type=gha

      - name: Test containers
        run: |
          # Start Alpine container
          docker run -d --name test-alpine -p 6000:6000 printer-monitor:test
          sleep 10
          
          # Test health check
          curl -f http://localhost:6000 || exit 1
          
          # Stop and remove
          docker stop test-alpine
          docker rm test-alpine
          
          echo "✅ All tests passed!"

  deploy-dev:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to development server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/printer-monitor
            git pull origin main
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
        continue-on-error: true
