<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打印机监控面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #eee;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d9ff;
      text-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .card h2 {
      color: #00d9ff;
      margin-bottom: 15px;
      font-size: 1.3em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .printer-item {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
    }
    .printer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .printer-name {
      font-weight: bold;
      font-size: 1.1em;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
    }
    .status-enabled { background: #00c853; color: #000; }
    .status-disabled { background: #ff5252; color: #fff; }
    .status-idle { background: #ffd740; color: #000; }
    .status-printing { background: #448aff; color: #fff; }
    .status-error { background: #ff1744; color: #fff; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
      margin: 4px;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: #00d9ff; color: #000; }
    .btn-danger { background: #ff5252; color: #fff; }
    .btn-success { background: #00c853; color: #000; }
    .btn-warning { background: #ffd740; color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.2); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-group { margin-top: 10px; display: flex; flex-wrap: wrap; }
    .log-output {
      background: #0a0a0a;
      border-radius: 6px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      max-height: 200px;
      overflow-y: auto;
      color: #00ff00;
    }
    .job-item {
      padding: 8px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      margin-bottom: 5px;
      font-size: 0.9em;
    }
    .result-item {
      padding: 8px;
      margin: 5px 0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-ok { background: rgba(0, 200, 83, 0.2); border-left: 3px solid #00c853; }
    .result-fail { background: rgba(255, 82, 82, 0.2); border-left: 3px solid #ff5252; }
    .result-info { background: rgba(0, 217, 255, 0.2); border-left: 3px solid #00d9ff; }
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.5em;
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
    }
    .loading { opacity: 0.6; pointer-events: none; }
    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .alert-error { background: rgba(255, 82, 82, 0.2); border: 1px solid #ff5252; }
    .alert-success { background: rgba(0, 200, 83, 0.2); border: 1px solid #00c853; }
    .default-badge {
      background: linear-gradient(135deg, #00d9ff, #0097a7);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      margin-left: 8px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖨️ 打印机监控面板</h1>
    
    <div id="alert-container"></div>
    
    <div class="grid">
      <div class="card">
        <h2>📋 打印机状态</h2>
        <div id="printers-list">加载中...</div>
      </div>
      
      <div class="card">
        <h2>📄 打印队列</h2>
        <select id="queue-printer" style="width:100%;padding:8px;margin-bottom:10px;border-radius:6px;">
          <option value="">所有打印机</option>
        </select>
        <div id="queue-list">点击刷新查看队列</div>
      </div>
      
      <div class="card">
        <h2>🔧 快速操作</h2>
        <div class="btn-group">
          <button class="btn btn-warning" onclick="restartService()">🔄 重启 CUPS 服务</button>
          <button class="btn btn-danger" onclick="clearAllQueues()">🗑️ 清除所有队列</button>
          <button class="btn btn-secondary" onclick="viewLogs()">📜 查看日志</button>
        </div>
        <div id="operation-result" style="margin-top:15px;"></div>
      </div>
      
      <div class="card">
        <h2>🔍 网络诊断</h2>
        <select id="network-printer" style="width:100%;padding:8px;margin-bottom:10px;border-radius:6px;">
          <option value="">选择打印机</option>
        </select>
        <button class="btn btn-primary" onclick="checkNetwork()" style="width:100%;">🌐 检查网络连接</button>
        <div id="network-result" style="margin-top:15px;"></div>
      </div>
    </div>
    
    <div class="card" style="margin-bottom:20px;">
      <h2>🤖 自动修复</h2>
      <select id="autofix-printer" style="width:100%;padding:8px;margin-bottom:10px;border-radius:6px;">
        <option value="">选择打印机</option>
      </select>
      <button class="btn btn-success" onclick="autoFix()" style="width:100%;">✨ 一键自动修复</button>
      <div id="autofix-result" style="margin-top:15px;"></div>
    </div>
    
    <button class="btn btn-primary refresh-btn" onclick="loadAll()" title="刷新">🔄</button>
  </div>

  <script>
    const API = '';
    
    function showAlert(message, type = 'error') {
      const container = document.getElementById('alert-container');
      container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => container.innerHTML = '', 5000);
    }
    
    async function loadAll() {
      await loadPrinters();
      await loadQueue();
    }
    
    async function loadPrinters() {
      const container = document.getElementById('printers-list');
      container.classList.add('loading');
      
      try {
        const res = await fetch(`${API}/api/printers`);
        const data = await res.json();
        
        if (!data.success) {
          container.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
          return;
        }
        
        if (data.printers.length === 0) {
          container.innerHTML = '<p>未找到打印机</p>';
          return;
        }
        
        container.innerHTML = data.printers.map(p => `
          <div class="printer-item">
            <div class="printer-header">
              <span class="printer-name">
                ${p.name}
                ${p.isDefault ? '<span class="default-badge">默认</span>' : ''}
              </span>
              <span class="status-badge status-${p.status}">${p.status}</span>
            </div>
            <p style="color:#aaa;font-size:0.9em;margin-bottom:10px;">${p.message || '无消息'}</p>
            <div class="btn-group">
              <button class="btn ${p.status === 'enabled' ? 'btn-danger' : 'btn-success'}" 
                      onclick="togglePrinter('${p.name}', '${p.status === 'enabled' ? 'disable' : 'enable'}')">
                ${p.status === 'enabled' ? '⏸️ 禁用' : '▶️ 启用'}
              </button>
              <button class="btn btn-warning" onclick="checkQueue('${p.name}')">📄 查看队列</button>
              <button class="btn btn-primary" onclick="checkNetwork('${p.name}')">🌐 网络检查</button>
              <button class="btn btn-success" onclick="autoFix('${p.name}')">✨ 自动修复</button>
            </div>
          </div>
        `).join('');
        
        // 更新下拉框
        const selects = ['queue-printer', 'network-printer', 'autofix-printer'];
        selects.forEach(id => {
          const select = document.getElementById(id);
          const currentValue = select.value;
          select.innerHTML = '<option value="">所有/选择打印机</option>' + 
            data.printers.map(p => `<option value="${p.name}">${p.name}${p.isDefault ? ' (默认)' : ''}</option>`).join('');
          select.value = currentValue;
        });
        
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">加载失败：${error.message}</div>`;
      } finally {
        container.classList.remove('loading');
      }
    }
    
    async function loadQueue(printer = '') {
      const container = document.getElementById('queue-list');
      const selectedPrinter = printer || document.getElementById('queue-printer').value;
      
      try {
        const res = await fetch(`${API}/api/queue/${selectedPrinter}`);
        const data = await res.json();
        
        if (!data.success || !data.jobs || data.jobs.length === 0) {
          container.innerHTML = '<p>队列为空</p>';
          return;
        }
        
        container.innerHTML = data.jobs.map(job => `
          <div class="job-item">
            <strong>ID: ${job.id}</strong> | 用户：${job.user} | 文件：${job.file}
          </div>
        `).join('');
        
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">加载失败：${error.message}</div>`;
      }
    }
    
    async function togglePrinter(name, action) {
      try {
        const res = await fetch(`${API}/api/toggle-printer/${name}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          showAlert(data.message, 'success');
          loadPrinters();
        } else {
          showAlert(data.error);
        }
      } catch (error) {
        showAlert(error.message);
      }
    }
    
    async function checkQueue(printer) {
      document.getElementById('queue-printer').value = printer;
      loadQueue(printer);
    }
    
    async function checkNetwork(printer = '') {
      const p = printer || document.getElementById('network-printer').value;
      if (!p) {
        showAlert('请选择打印机');
        return;
      }
      
      const container = document.getElementById('network-result');
      container.innerHTML = '<p>检查中...</p>';
      
      try {
        const res = await fetch(`${API}/api/check-network/${p}`, { method: 'POST' });
        const data = await res.json();
        
        if (!data.success) {
          container.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
          return;
        }
        
        container.innerHTML = `
          <div class="result-item result-${data.reachable !== false ? 'ok' : 'fail'}">
            <strong>打印机:</strong> ${data.printer}
          </div>
          <div class="result-item result-info">
            <strong>URI:</strong> ${data.uri || 'N/A'}
          </div>
          ${data.host ? `
            <div class="result-item result-${data.reachable ? 'ok' : 'fail'}">
              <strong>主机:</strong> ${data.host}
              <strong>状态:</strong> ${data.reachable ? '✅ 可达' : '❌ 不可达'}
            </div>
          ` : ''}
          ${data.pingResult ? `<div class="log-output">${data.pingResult}</div>` : ''}
        `;
        
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">检查失败：${error.message}</div>`;
      }
    }
    
    async function clearAllQueues() {
      if (!confirm('确定要清除所有打印队列吗？')) return;
      
      try {
        const res = await fetch(`${API}/api/clear-queue/`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          showAlert(data.message, 'success');
          loadQueue();
        } else {
          showAlert(data.error);
        }
      } catch (error) {
        showAlert(error.message);
      }
    }
    
    async function restartService() {
      if (!confirm('确定要重启 CUPS 服务吗？这会中断所有打印任务。')) return;
      
      const container = document.getElementById('operation-result');
      container.innerHTML = '<p>重启中...</p>';
      
      try {
        const res = await fetch(`${API}/api/restart-service`, { method: 'POST' });
        const data = await res.json();
        container.innerHTML = data.success 
          ? `<div class="alert alert-success">${data.message}</div>`
          : `<div class="alert alert-error">${data.error}</div>`;
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">操作失败：${error.message}</div>`;
      }
    }
    
    async function viewLogs() {
      try {
        const res = await fetch(`${API}/api/logs`);
        const data = await res.json();
        
        const container = document.getElementById('operation-result');
        if (data.success) {
          container.innerHTML = `<div class="log-output" style="max-height:400px;">${data.logs}</div>`;
        } else {
          container.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch (error) {
        showAlert(error.message);
      }
    }
    
    async function autoFix(printer = '') {
      const p = printer || document.getElementById('autofix-printer').value;
      if (!p) {
        showAlert('请选择打印机');
        return;
      }
      
      const container = document.getElementById('autofix-result');
      container.innerHTML = '<p>🔍 正在诊断和修复...</p>';
      
      try {
        const res = await fetch(`${API}/api/auto-fix/${p}`, { method: 'POST' });
        const data = await res.json();
        
        if (!data.success) {
          container.innerHTML = `<div class="alert alert-error">${data.error || '修复失败'}</div>`;
        }
        
        let html = '<h3 style="margin:15px 0 10px;">修复报告</h3>';
        if (data.results) {
          html += data.results.map(r => `
            <div class="result-item result-${r.status === 'ok' || r.status === 'done' ? 'ok' : r.status === 'failed' ? 'fail' : 'info'}">
              <strong>${r.step}:</strong> ${r.status === 'ok' ? '✅' : r.status === 'done' ? '✅' : r.status === 'failed' ? '❌' : '⏳'} 
              ${r.message || ''}
            </div>
          `).join('');
        }
        
        container.innerHTML = html;
        loadPrinters();
        
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">修复失败：${error.message}</div>`;
      }
    }
    
    // 初始化
    document.getElementById('queue-printer').addEventListener('change', () => loadQueue());
    loadAll();
    
    // 每 30 秒自动刷新
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
